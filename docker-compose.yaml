services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: byld
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/byld?schema=public"
    # SUCCESS KEY: Generate client, migrate, seed, then start
    command: >
      sh -c "npx prisma generate && 
        npx prisma migrate deploy && 
        node prisma/seed.js && 
        npm start"